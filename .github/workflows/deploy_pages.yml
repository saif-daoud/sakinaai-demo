name: Deploy SakinaAI Demo

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Worker dependencies
        run: npm --prefix worker ci

      - name: Prepare and deploy Cloudflare Worker
        id: worker
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TOKEN_SECRET: ${{ secrets.TOKEN_SECRET }}
          ACCESS_CODE_HASHES: ${{ secrets.ACCESS_CODE_HASHES }}
          ACCESS_CODE_HASH: ${{ secrets.ACCESS_CODE_HASH }}
          FANAR_API: ${{ secrets.FANAR_API }}
          HF_API: ${{ secrets.HF_API }}
          HF_DEDICATED_API_KEY: ${{ secrets.HF_DEDICATED_API_KEY }}
          HF_DEDICATED_ENDPOINTS: ${{ secrets.HF_DEDICATED_ENDPOINTS }}
          OPENROUTER_API_KEYS: ${{ secrets.OPENROUTER_API_KEYS }}
          API_KEYS: ${{ secrets.API_KEYS }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_API_VERSION: ${{ secrets.AZURE_OPENAI_API_VERSION }}
          AZURE_OPENAI_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_DEPLOYMENT }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_COMPATIBLE_ENDPOINT: ${{ secrets.OPENAI_COMPATIBLE_ENDPOINT }}
        run: |
          set +e
          set -u
          set -o pipefail

          WORKER_NAME="sakinaai-demo-api"
          DB_NAME="sakinaai_demo"
          WORKER_URL=""

          if [ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ] || [ -z "${CLOUDFLARE_API_TOKEN:-}" ]; then
            echo "Cloudflare secrets are missing; skipping Worker deploy."
            echo "worker_url=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          D1_LIST_JSON="$(curl -fsS \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/d1/database?per_page=100" 2>d1-list.err)"

          DB_ID="$(D1_LIST_JSON="$D1_LIST_JSON" DB_NAME="$DB_NAME" node - <<'NODE' 2>/dev/null
          const payload = JSON.parse(process.env.D1_LIST_JSON || "{}");
          const rows = Array.isArray(payload) ? payload : payload.result || payload.databases || [];
          const match = rows.find((row) => row.name === process.env.DB_NAME);
          process.stdout.write(match?.uuid || match?.id || match?.database_id || "");
          NODE
          )"

          if [ -z "$DB_ID" ]; then
            D1_CREATE_JSON="$(curl -fsS -X POST \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              -H "Content-Type: application/json" \
              "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/d1/database" \
              --data "{\"name\":\"${DB_NAME}\"}" 2>d1-create.err)"
            DB_ID="$(D1_CREATE_JSON="$D1_CREATE_JSON" node - <<'NODE' 2>/dev/null
          const payload = JSON.parse(process.env.D1_CREATE_JSON || "{}");
          const row = Array.isArray(payload) ? payload[0] : payload.result || payload;
          process.stdout.write(row?.uuid || row?.id || row?.database_id || "");
          NODE
            )"
          fi

          if [ -z "$DB_ID" ]; then
            echo "Could not resolve D1 database id." >&2
            cat d1-list.err d1-create.err 2>/dev/null || true
            echo "worker_url=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          DB_ID="$DB_ID" node - <<'NODE'
          const fs = require("fs");
          const file = "worker/wrangler.toml";
          let toml = fs.readFileSync(file, "utf8");
          toml = toml.replace(/database_id = ".*"/, `database_id = "${process.env.DB_ID}"`);
          fs.writeFileSync(file, toml);
          NODE

          put_secret() {
            local name="$1"
            local value="$2"
            if [ -n "${value:-}" ]; then
              printf "%s" "$value" | (cd worker && npx wrangler secret put "$name")
            fi
          }

          EFFECTIVE_ACCESS_HASHES="${ACCESS_CODE_HASHES:-${ACCESS_CODE_HASH:-}}"
          EFFECTIVE_OPENROUTER_KEYS="${OPENROUTER_API_KEYS:-${API_KEYS:-}}"
          if [ -n "${TOKEN_SECRET:-}" ]; then
            EFFECTIVE_TOKEN_SECRET="$TOKEN_SECRET"
          else
            EFFECTIVE_TOKEN_SECRET="$(node -e "console.log(require('crypto').randomBytes(32).toString('hex'))")"
          fi

          put_secret TOKEN_SECRET "$EFFECTIVE_TOKEN_SECRET"
          put_secret ACCESS_CODE_HASHES "${EFFECTIVE_ACCESS_HASHES:-}"
          put_secret FANAR_API "${FANAR_API:-}"
          put_secret HF_API "${HF_API:-}"
          put_secret HF_DEDICATED_API_KEY "${HF_DEDICATED_API_KEY:-}"
          put_secret HF_DEDICATED_ENDPOINTS "${HF_DEDICATED_ENDPOINTS:-}"
          put_secret OPENROUTER_API_KEYS "${EFFECTIVE_OPENROUTER_KEYS:-}"
          put_secret AZURE_OPENAI_API_KEY "${AZURE_OPENAI_API_KEY:-}"
          put_secret AZURE_OPENAI_API_VERSION "${AZURE_OPENAI_API_VERSION:-}"
          put_secret AZURE_OPENAI_DEPLOYMENT "${AZURE_OPENAI_DEPLOYMENT:-}"
          put_secret AZURE_OPENAI_ENDPOINT "${AZURE_OPENAI_ENDPOINT:-}"
          put_secret OPENAI_API_KEY "${OPENAI_API_KEY:-}"
          put_secret OPENAI_COMPATIBLE_ENDPOINT "${OPENAI_COMPATIBLE_ENDPOINT:-}"

          (cd worker && npx wrangler d1 migrations apply "$DB_NAME" --remote)
          (cd worker && npx wrangler deploy 2>&1 | tee ../worker-deploy.log)

          WORKER_URL="$(node - <<'NODE' 2>/dev/null
          const fs = require("fs");
          const log = fs.existsSync("worker-deploy.log") ? fs.readFileSync("worker-deploy.log", "utf8") : "";
          const match = log.match(/https:\/\/[^\s"')]+\.workers\.dev/);
          process.stdout.write(match ? match[0].replace(/[),.]+$/, "") : "");
          NODE
          )"

          if [ -z "$WORKER_URL" ]; then
            SUBDOMAIN_JSON="$(curl -fsS \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              -H "Content-Type: application/json" \
              "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/workers/subdomain" 2>/dev/null)"
            SUBDOMAIN="$(SUBDOMAIN_JSON="$SUBDOMAIN_JSON" node - <<'NODE' 2>/dev/null
          const payload = JSON.parse(process.env.SUBDOMAIN_JSON || "{}");
          const result = payload?.result;
          process.stdout.write((typeof result === "string" ? result : result?.subdomain || result?.name || ""));
          NODE
            )"
            if [ -n "$SUBDOMAIN" ]; then
              WORKER_URL="https://${WORKER_NAME}.${SUBDOMAIN}.workers.dev"
            fi
          fi

          echo "worker_url=$WORKER_URL" >> "$GITHUB_OUTPUT"

      - name: Write runtime config
        env:
          SECRET_API_BASE: ${{ secrets.VITE_API_BASE }}
          DETECTED_WORKER_URL: ${{ steps.worker.outputs.worker_url }}
        run: |
          mkdir -p public/data
          API_BASE="${SECRET_API_BASE:-${DETECTED_WORKER_URL:-}}" node - <<'NODE'
          const fs = require("fs");
          fs.writeFileSync(
            "public/data/runtime-config.json",
            `${JSON.stringify({ apiBase: process.env.API_BASE || "", generatedAt: new Date().toISOString() }, null, 2)}\n`,
          );
          NODE

      - name: Build frontend
        env:
          VITE_BASE_PATH: /sakinaai-demo/
          VITE_API_BASE: ${{ secrets.VITE_API_BASE || steps.worker.outputs.worker_url }}
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
